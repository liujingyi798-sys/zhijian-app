name: zhijian_app
description: 智健 - AI-powered fitness progress tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # Camera & Images
  camera: ^0.10.6
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6

  # Networking
  http: ^1.2.1
  dio: ^5.5.0+1
  web_socket_channel: ^2.4.5

  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4

  # Calendar
  table_calendar: ^3.1.2

  # Media
  video_player: ^2.9.1
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
